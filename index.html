<script>
const phases = [
  {
    title: "Morning",
    choices: [
      {
        text: "Wake up early and exercise",
        stress: -10,
        energy: +15,
        grades: +5
      },

      {
        text: "Sleep in late",
        stress: +5,
        energy: +10,
        grades: -10
      },

      {
        text: "Study before school",
        stress: +10,
        energy: -5,
        grades: +15
      }
    ]
  },

  {
    title: "At School",
    choices: [
      {
        text: "Pay attention in class",
        stress: +5,
        energy: -5,
        grades: +15
      },

      {
        text: "Talk with friends",
        stress: -10,
        energy: +5,
        grades: -5
      },

      {
        text: "Skip class",
        stress: +15,
        energy: +10,
        grades: -20
      }
    ]
  },

  {
    title: "Afternoon",
    choices: [
      {
        text: "Do homework",
        stress: +10,
        energy: -10,
        grades: +20
      },

      {
        text: "Play games",
        stress: -10,
        energy: +10,
        grades: -10
      },

      {
        text: "Go outside",
        stress: -15,
        energy: +15,
        grades: 0
      }
    ]
  },

  {
    title: "Night",
    choices: [
      {
        text: "Sleep early",
        stress: -10,
        energy: +20,
        grades: +5
      },

      {
        text: "Watch videos all night",
        stress: +15,
        energy: -20,
        grades: -10
      },

      {
        text: "Study late",
        stress: +10,
        energy: -15,
        grades: +20
      }
    ]
  }
];

let currentPhase = 0;

let stats = {
  stress: 50,
  energy: 50,
  grades: 50
};

function startGame(){
  currentPhase = 0;

  stats = {
    stress: 50,
    energy: 50,
    grades: 50
  };

  nextPhase();
}

function nextPhase(){

  const output =
    document.getElementById("game-output");

  output.style.display = "block";

  if(currentPhase >= phases.length){
    showEnding();
    return;
  }

  const phase = phases[currentPhase];

  let html = `
    <h2>${phase.title}</h2>

    <p>
      Stress: ${stats.stress}
      <br>
      Energy: ${stats.energy}
      <br>
      Grades: ${stats.grades}
    </p>

    <br>
  `;

  phase.choices.forEach((choice, index) => {

    html += `
      <button
        class="choice-btn"
        onclick="pickChoice(${index})"
      >
        ${choice.text}
      </button>

      <br><br>
    `;
  });

  output.innerHTML = html;
}

function pickChoice(index){

  const phase = phases[currentPhase];

  const choice = phase.choices[index];

  stats.stress += choice.stress;
  stats.energy += choice.energy;
  stats.grades += choice.grades;

  stats.stress =
    Math.max(0, Math.min(100, stats.stress));

  stats.energy =
    Math.max(0, Math.min(100, stats.energy));

  stats.grades =
    Math.max(0, Math.min(100, stats.grades));

  currentPhase++;

  nextPhase();
}

function showEnding(){

  const output =
    document.getElementById("game-output");

  let ending = "";
  let message = "";

  if(
    stats.energy > 70 &&
    stats.stress < 40 &&
    stats.grades > 60
  ){
    ending = "🌿 Balanced";
    message =
      "You managed your day really well.";
  }

  else if(stats.stress > 80){
    ending = "🥵 Burnout";
    message =
      "You pushed yourself too hard.";
  }

  else if(stats.grades < 30){
    ending = "🌀 Unproductive";
    message =
      "You struggled to stay focused.";
  }

  else if(stats.energy > 70){
    ending = "🤝 Social";
    message =
      "You had a fun and energetic day.";
  }

  else{
    ending = "🌤️ Ordinary";
    message =
      "A pretty normal day overall.";
  }

  output.innerHTML = `
    <h2>Final Ending</h2>

    <h1>${ending}</h1>

    <p>${message}</p>

    <br>

    <p>
      Final Stats:
      <br><br>

      Stress: ${stats.stress}
      <br>

      Energy: ${stats.energy}
      <br>

      Grades: ${stats.grades}
    </p>

    <br>

    <button
      class="primary-btn"
      onclick="startGame()"
    >
      Play Again
    </button>
  `;
}
</script>
